<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <title>Kalkulačka úspěchu</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #000000, #1a0033, #2d0066);
      color: white;
      height: 100vh;
    }

    .container {
      position: relative;
      height: 100vh;
    }

    .card {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(20, 0, 40, 0.9);
      padding: 30px;
      border-radius: 20px;
      width: 90%;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 0 30px rgba(140, 0, 255, 0.5);
    }

    input {
      width: 100%;
      padding: 14px;
      margin: 10px 0;
      border-radius: 10px;
      border: none;
      background: #1a0033;
      color: white;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 15px;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(90deg, #7b00ff, #b300ff);
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    #result {
      margin-top: 20px;
      line-height: 1.6;
    }

    .success {
      background: rgba(0, 255, 150, 0.1);
      border: 1px solid #00ff99;
      color: #00ff99;
      padding: 10px;
      border-radius: 10px;
      margin-top: 10px;
      font-weight: bold;
    }

    .error {
      background: rgba(255, 80, 80, 0.1);
      border: 1px solid #ff4d4d;
      color: #ff4d4d;
      padding: 10px;
      border-radius: 10px;
      margin-top: 10px;
      font-weight: bold;
    }

    #progressContainer {
      display: none;
      margin-top: 15px;
    }

    #progressBar {
      height: 10px;
      width: 0%;
      border-radius: 10px;
      transition: 0.5s;
    }

    #cta {
      display: none;
      margin-top: 20px;
    }

    #tgButton {
      width: 100%;
      padding: 15px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(90deg, #0088cc, #00c6ff);
      color: white;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }

    /* 🔥 NOTIFIKACE */
    #popup {
      position: fixed;
      bottom: 20px;
      left: 20px;
      background: rgba(0,0,0,0.9);
      padding: 10px 15px;
      border-radius: 10px;
      font-size: 13px;
      color: #00ff99;
      display: none;
      box-shadow: 0 0 10px rgba(0,255,150,0.3);
      animation: fadeIn 0.5s;
    }

    @keyframes fadeIn {
      from { opacity:0; transform:translateY(10px); }
      to { opacity:1; transform:translateY(0); }
    }

    @media (max-width: 600px) {
      .card {
        position: static;
        transform: none;
        margin: 20px auto;
      }
      body { height: auto; }
    }
  </style>
</head>

<body>

<div class="container">
  <div class="card">

    <h2>💸 Kolik musíš udělat, abys vydělal?</h2>

    <p style="color:#aaa; font-size:14px; margin-top:-10px;">
      Zjisti během 5 sekund, jestli na to jdeš správně
    </p>

    <input type="tel" id="money" placeholder="Kolik chceš vydělat (Kč)">
    <input type="tel" id="team" placeholder="Kolik lidí chceš mít v týmu">

    <button onclick="calculate()">Spočítat</button>

    <div id="result"></div>

    <div id="progressContainer">
      <div style="background:#1a0033; border-radius:10px;">
        <div id="progressBar"></div>
      </div>
      <div id="progressText" style="margin-top:5px; font-size:12px; color:#aaa;"></div>
    </div>

    <div id="cta">
      <p style="color:#aaa;">
        💬 Ukážu ti přesně jak to dát krok za krokem (zdarma)
      </p>
      <button id="tgButton" onclick="openTelegram()">
        🔥 Chci vědět jak to dát
      </button>
    </div>

  </div>
</div>

<!-- 🔥 POPUP -->
<div id="popup"></div>

<script>
function calculate() {
  let money = parseFloat(document.getElementById("money").value.replace(",", "."));
  let team = parseFloat(document.getElementById("team").value.replace(",", "."));

  if (isNaN(money) || isNaN(team)) {
    document.getElementById("result").innerHTML = "❌ Vyplň vše.";
    return;
  }

  let pv = money / 7;
  let neededPeople = Math.ceil(pv / 100);
  let missing = Math.ceil(neededPeople - team);

  let resultBox = document.getElementById("result");

  resultBox.innerHTML =
    `🎯 Potřebuješ ${Math.ceil(pv)} PV<br>
     👥 Potřebuješ: ${neededPeople} lidí<br>
     👤 Máš: ${Math.ceil(team)}<br>`;

  let msg = document.createElement("div");
  msg.className = missing > 0 ? "error" : "success";
  msg.innerHTML = missing > 0 
    ? `⚠️ Chybí ti ${missing} lidí`
    : `✅ Máš dost lidí – teď stačí výkon`;

  resultBox.appendChild(msg);

  // progress
  let progress = Math.min((team / neededPeople) * 100, 100);
  document.getElementById("progressContainer").style.display = "block";
  document.getElementById("progressBar").style.width = progress + "%";
  document.getElementById("progressBar").style.background =
    progress < 50 ? "#ff4d4d" : progress < 100 ? "#ffaa00" : "#00ff99";

  document.getElementById("progressText").innerHTML =
    `📊 Máš splněno ${Math.round(progress)}% týmu`;

  document.getElementById("cta").style.display = "block";
}

// 🔥 FAKE SOCIAL PROOF
let names = ["Martin","Petr","Jan","Tomáš","David","Lukáš"];

function showPopup() {
  let popup = document.getElementById("popup");
  let name = names[Math.floor(Math.random()*names.length)];

  popup.innerHTML = `🔥 ${name} právě začal budovat tým`;
  popup.style.display = "block";

  setTimeout(() => popup.style.display = "none", 3000);
}

setInterval(showPopup, 8000);

// Telegram
function openTelegram() {
  window.location.href = "https://t.me/Simon37FX";
}
</script>

</body>
</html>
