<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <title>Kalkulačka úspěchu</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #000000, #1a0033, #2d0066);
      color: white;
    }

    .container {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: rgba(20, 0, 40, 0.85);
      padding: 30px;
      border-radius: 20px;
      width: 90%;
      max-width: 350px;
      text-align: center;
      box-shadow: 0 0 30px rgba(140, 0, 255, 0.5);
    }

    h1 {
      margin-bottom: 25px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: none;
      border-radius: 10px;
      background: #1a0033;
      color: white;
      font-size: 14px;
    }

    input::placeholder {
      color: #aaa;
    }

    /* odstranění šipek */
    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    input[type="number"] {
      -moz-appearance: textfield;
      appearance: textfield;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 15px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(90deg, #7b00ff, #b300ff);
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 15px #b300ff;
    }

    #result {
      margin-top: 25px;
      font-size: 15px;
      line-height: 1.5;
      transition: 0.5s;
    }
  </style>
</head>

<body>

<div class="container">
  <div class="card">
    <h1>💸 Vypočítej si svůj plán</h1>

    <input type="number" id="money" placeholder="Měsíční cíl (Kč)">
    <input type="number" id="hours" placeholder="Hodiny týdně">

    <button onclick="calculate()">Spočítat</button>

    <div id="result"></div>
  </div>
</div>

<script>
function calculate() {
  let money = parseFloat(document.getElementById("money").value);
  let hours = parseFloat(document.getElementById("hours").value);

  if (isNaN(money) || isNaN(hours)) {
    document.getElementById("result").innerHTML = "❌ Prosím vyplň všechna pole.";
    return;
  }

  // hodinová sazba
  let hourly = money / (hours * 4.33);

  // průměrná hodnota 1 PV
  let valuePerPV = 7;

  // kolik PV potřebuješ
  let totalPVNeeded = money / valuePerPV;

  // levely
  let levels = [
    { pv: 200, percent: 3 },
    { pv: 600, percent: 6 },
    { pv: 1200, percent: 9 },
    { pv: 2400, percent: 12 },
    { pv: 4000, percent: 15 },
    { pv: 7000, percent: 18 },
    { pv: 10000, percent: 21 }
  ];

  // najdeme level
  let chosen = levels[levels.length - 1];

  for (let level of levels) {
    if (totalPVNeeded <= level.pv) {
      chosen = level;
      break;
    }
  }

  let pvPerDay = chosen.pv / 30;

  let resultBox = document.getElementById("result");

  // barvy
  if (chosen.pv > 1000) {
    resultBox.style.color = "#ff4d4d";
  } else if (chosen.pv > 500) {
    resultBox.style.color = "#ffaa00";
  } else {
    resultBox.style.color = "#00ff99";
  }

  // animace
  resultBox.style.opacity = 0;
  setTimeout(() => {
    resultBox.style.opacity = 1;
  }, 100);

  resultBox.innerHTML =
    `💸 <b>${hourly.toFixed(0)} Kč/hod</b><br><br>

     🎯 Potřebuješ cca: <b>${totalPVNeeded.toFixed(0)} PV</b><br>
     📊 Tvůj level: <b>${chosen.percent}%</b><br>
     📈 Reálně musíš dát: <b>${chosen.pv} PV</b><br><br>

     📆 Denně: <b>${pvPerDay.toFixed(1)} PV</b><br><br>

     🔥 Tohle je tvůj plán.<br>
     👉 Teď víš přesně, kolik bodů musíš dát.`;

  if (chosen.pv > totalPVNeeded * 1.5) {
    resultBox.innerHTML += "<br><br>⚠️ Máš velkou rezervu – můžeš optimalizovat.";
  }
}
</script>

</body>
</html>
