<!DOCTYPE html>
<html lang="cs">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="UTF-8">
  <title>Kalkulačka úspěchu</title>

  <style>
    body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #000000, #1a0033, #2d0066);
  color: white;
  min-height: 100vh; /* 👈 přidej tohle */
}
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #000000, #1a0033, #2d0066);
      color: white;
    }

    .container {
  display: flex;
  justify-content: center;
  padding: 20px;
}

    .card {
      background: rgba(20, 0, 40, 0.9);
      padding: 30px;
      border-radius: 20px;
      width: 100%;
      max-width: 420px;
      text-align: center;
      box-shadow: 0 0 30px rgba(140, 0, 255, 0.5);
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 10px;
      border: none;
      background: #1a0033;
      color: white;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(90deg, #7b00ff, #b300ff);
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    #result {
      margin-top: 20px;
      line-height: 1.6;
    }

    #cta {
      display: none;
      margin-top: 20px;
    }

    #tgButton {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(90deg, #0088cc, #00c6ff);
      color: white;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }
    @media (max-width: 600px) {
  .card {
    padding: 20px;
    border-radius: 15px;
  }

  h2 {
    font-size: 20px;
  }

  input {
    font-size: 16px;
    padding: 14px;
  }

  button {
    font-size: 16px;
    padding: 16px;
  }

  #tgButton {
    padding: 16px;
  }
  </style>
</head>

<body>

<div class="container">
  <div class="card">

    <h2>💸 Vypočítej si svůj plán</h2>

    <input type="number" id="money" placeholder="Kolik chceš vydělat (Kč)">
    <input type="number" id="hours" placeholder="Hodiny týdně">

    <button onclick="calculate()">Spočítat</button>

    <div id="result"></div>

    <div id="cta">
      <p>💬 Když chceš vědět jak to dát → napiš mi</p>
      <button id="tgButton" onclick="openTelegram()">
        🚀 Napsat na Telegram
      </button>
    </div>

  </div>
</div>

<script>
function calculate() {
  let money = parseFloat(document.getElementById("money").value);
  let hours = parseFloat(document.getElementById("hours").value);

  if (isNaN(money) || isNaN(hours)) {
    document.getElementById("result").innerHTML = "❌ Vyplň vše.";
    return;
  }

  let hourly = money / (hours * 4.33);
  let pv = money / 7;

  let levels = [
    { pv: 200, percent: 3 },
    { pv: 600, percent: 6 },
    { pv: 1200, percent: 9 },
    { pv: 2400, percent: 12 },
    { pv: 4000, percent: 15 },
    { pv: 7000, percent: 18 },
    { pv: 10000, percent: 21 }
  ];

  let chosen = levels[levels.length - 1];

  for (let level of levels) {
    if (pv <= level.pv) {
      chosen = level;
      break;
    }
  }

  let daily = chosen.pv / 30;
  let people = chosen.pv / 100;

  document.getElementById("result").innerHTML =
    `💸 ${hourly.toFixed(0)} Kč/hod<br><br>
     🎯 ${pv.toFixed(0)} PV<br>
     📊 Level ${chosen.percent}%<br>
     📈 ${chosen.pv} PV<br><br>
     📆 ${daily.toFixed(1)} PV denně<br>
     👥 ${people.toFixed(1)} lidí<br><br>
     🔥 Tohle je tvůj plán`;

  document.getElementById("cta").style.display = "block";
}

function openTelegram() {
  let username = "Simon37FX";
  let text = encodeURIComponent("Ahoj, chci poradit s plánem");
  window.open(`https://t.me/${username}?text=${text}`, "_blank");
}
</script>

</body>
</html>
