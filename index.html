<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <title>Kalkulačka úspěchu</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #000000, #1a0033, #2d0066);
      color: white;
    }

    .hero {
      text-align: center;
      padding: 40px 20px 10px;
    }

    .container {
      display: flex;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: rgba(20, 0, 40, 0.85);
      padding: 30px;
      border-radius: 20px;
      width: 90%;
      max-width: 380px;
      text-align: center;
      box-shadow: 0 0 30px rgba(140, 0, 255, 0.5);
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: none;
      border-radius: 10px;
      background: #1a0033;
      color: white;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 15px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(90deg, #7b00ff, #b300ff);
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    #tgButton {
      margin-top: 10px;
      background: linear-gradient(90deg, #0088cc, #00c6ff);
    }

    #result {
      margin-top: 25px;
    }

    #cta {
      display: none;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<div class="hero">
  <h1>🚀 Kolik musíš udělat, abys vydělal?</h1>
  <p>Spočítej si plán během 5 sekund</p>
</div>

<div class="container">
  <div class="card">

    <input type="number" id="money" placeholder="Kolik chceš vydělat (Kč)">
    <input type="number" id="hours" placeholder="Kolik hodin týdně">

    <button onclick="calculate()">Spočítat plán</button>

    <div id="result"></div>

    <div id="cta">
      <p>💬 Kdyby si chtěl poradit, napiš mi</p>
      <button id="tgButton" onclick="openTelegram()">
        🚀 Napsat na Telegram
      </button>
    </div>

  </div>
</div>

<script>
function calculate() {
  let money = parseFloat(document.getElementById("money").value);
  let hours = parseFloat(document.getElementById("hours").value);

  if (isNaN(money) || isNaN(hours)) {
    document.getElementById("result").innerHTML = "❌ Vyplň vše.";
    return;
  }

  let hourly = money / (hours * 4.33);
  let valuePerPV = 7;
  let totalPV = money / valuePerPV;

  let levels = [
    { pv: 200, percent: 3 },
    { pv: 600, percent: 6 },
    { pv: 1200, percent: 9 },
    { pv: 2400, percent: 12 },
    { pv: 4000, percent: 15 },
    { pv: 7000, percent: 18 },
    { pv: 10000, percent: 21 }
  ];

  let chosen = levels[levels.length - 1];

  for (let level of levels) {
    if (totalPV <= level.pv) {
      chosen = level;
      break;
    }
  }

  let pvPerDay = chosen.pv / 30;
  let peopleNeeded = chosen.pv / 100;

  document.getElementById("result").innerHTML =
    `💸 ${hourly.toFixed(0)} Kč/hod<br><br>
     🎯 ${totalPV.toFixed(0)} PV<br>
     📊 Level ${chosen.percent}%<br>
     📈 ${chosen.pv} PV<br><br>
     📆 ${pvPerDay.toFixed(1)} PV denně<br>
     👥 ${peopleNeeded.toFixed(1)} lidí<br><br>
     🔥 Tohle je tvůj plán`;

  document.getElementById("cta").style.display = "block";
}

// 🔥 TELEGRAM FUNKCE
function openTelegram() {
  let username = "Simon37FX";
  let text = encodeURIComponent("Ahoj, chci poradit s plánem");

  let url = `https://t.me/${username}?text=${text}`;

  window.open(url, "_blank");
}
</script>

</body>
</html>
