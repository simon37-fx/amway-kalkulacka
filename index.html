<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <title>Kalkulačka úspěchu</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #000000, #1a0033, #2d0066);
      color: white;
      height: 100vh;
    }

    .container {
      position: relative;
      height: 100vh;
    }

    .card {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(20, 0, 40, 0.9);
      padding: 30px;
      border-radius: 20px;
      width: 90%;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 0 30px rgba(140, 0, 255, 0.5);
    }

    input {
      /* ❌ odstranění šipek u number input */
input[type="number"]::-webkit-outer-spin-button,
input[type="number"]::-webkit-inner-spin-button {
  -webkit-appearance: none;
  margin: 0;
}

input[type="number"] {
  -moz-appearance: textfield;
  appearance: textfield;
}
      width: 100%;
      padding: 14px;
      margin: 10px 0;
      border-radius: 10px;
      border: none;
      background: #1a0033;
      color: white;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 15px;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(90deg, #7b00ff, #b300ff);
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    #result {
      margin-top: 20px;
      line-height: 1.6;
    }

    #cta {
      display: none;
      margin-top: 20px;
    }

    #tgButton {
      width: 100%;
      padding: 15px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(90deg, #0088cc, #00c6ff);
      color: white;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }

    @media (max-width: 600px) {
      .card {
        position: static;
        transform: none;
        margin: 20px auto;
      }

      body {
        height: auto;
      }
    }
  </style>
</head>

<body>

<div class="container">
  <div class="card">

    <h2>💸 Vypočítej si svůj plán</h2>

    <!-- ✅ jen 2 inputy -->
    <input type="number" id="money" placeholder="Kolik chceš vydělat (Kč)">
    <input type="number" id="team" placeholder="Kolik lidí chceš mít v týmu">

    <button onclick="calculate()">Spočítat</button>

    <div id="result"></div>

    <div id="cta">
      <p>💬 Když chceš vědět jak to dát → napiš mi</p>
      <button id="tgButton" onclick="openTelegram()">
        🚀 Napsat na Telegram
      </button>
    </div>

  </div>
</div>

<script>
function calculate() {
  let money = parseFloat(document.getElementById("money").value);
  let team = parseFloat(document.getElementById("team").value);

  if (isNaN(money) || isNaN(team)) {
    document.getElementById("result").innerHTML = "❌ Vyplň vše.";
    return;
  }

  let pv = money / 7;

  let levels = [
    { pv: 200, percent: 3 },
    { pv: 600, percent: 6 },
    { pv: 1200, percent: 9 },
    { pv: 2400, percent: 12 },
    { pv: 4000, percent: 15 },
    { pv: 7000, percent: 18 },
    { pv: 10000, percent: 21 }
  ];

  let chosen = levels[levels.length - 1];

  for (let level of levels) {
    if (pv <= level.pv) {
      chosen = level;
      break;
    }
  }

  let neededPeople = chosen.pv / 100;
  let missing = neededPeople - team;

  let message = "";

  if (missing > 0) {
    message = `⚠️ Chybí ti ${missing.toFixed(1)} lidí`;
  } else {
    message = `🔥 Máš dost lidí – teď stačí výkon`;
  }

  document.getElementById("result").innerHTML =
    `🎯 Potřebuješ ${pv.toFixed(0)} PV<br>
     📊 Level ${chosen.percent}%<br><br>

     👥 Potřebuješ: ${neededPeople.toFixed(1)} lidí<br>
     👤 Máš: ${team}<br><br>

     ${message}`;

  document.getElementById("cta").style.display = "block";
}

function openTelegram() {
  let username = "Simon37FX"; // změň!
  let text = encodeURIComponent("Ahoj, chci poradit s plánem");
  window.open(`https://t.me/${username}?text=${text}`, "_blank");
}
</script>

</body>
</html>
