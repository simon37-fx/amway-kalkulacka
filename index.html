<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <title>Kalkulačka úspěchu</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #000000, #1a0033, #2d0066);
      color: white;
      height: 100vh;
    }

    .container {
      position: relative;
      height: 100vh;
    }

    .card {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(20, 0, 40, 0.9);
      padding: 30px;
      border-radius: 20px;
      width: 90%;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 0 30px rgba(140, 0, 255, 0.5);
    }

    input {
      width: 100%;
      padding: 14px;
      margin: 10px 0;
      border-radius: 10px;
      border: none;
      background: #1a0033;
      color: white;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 15px;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(90deg, #7b00ff, #b300ff);
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    #result {
      margin-top: 20px;
      line-height: 1.6;
    }

    .success {
      background: rgba(0, 255, 150, 0.1);
      border: 1px solid #00ff99;
      color: #00ff99;
      padding: 10px;
      border-radius: 10px;
      margin-top: 10px;
      font-weight: bold;
    }

    .error {
      background: rgba(255, 80, 80, 0.1);
      border: 1px solid #ff4d4d;
      color: #ff4d4d;
      padding: 10px;
      border-radius: 10px;
      margin-top: 10px;
      font-weight: bold;
    }

    #cta {
      display: none;
      margin-top: 20px;
    }

    #tgButton {
      width: 100%;
      padding: 15px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(90deg, #0088cc, #00c6ff);
      color: white;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }

    @media (max-width: 600px) {
      .card {
        position: static;
        transform: none;
        margin: 20px auto;
      }

      body {
        height: auto;
      }
    }
  </style>
</head>

<body>

<div class="container">
  <div class="card">

    <h2>💸 Kolik musíš udělat, abys vydělal?</h2>

    <p style="color:#aaa; font-size:14px; margin-top:-10px;">
      Zjisti během 5 sekund, jestli na to jdeš správně
    </p>

    <input type="tel" id="money" placeholder="Kolik chceš vydělat (Kč)">
    <input type="tel" id="team" placeholder="Kolik lidí chceš mít v týmu">

    <button onclick="calculate()">Spočítat</button>

    <div id="result"></div>

    <div id="cta">
      <p style="color:#aaa;">
        💬 Ukážu ti přesně jak to dát krok za krokem (zdarma)
      </p>
      <button id="tgButton" onclick="openTelegram()">
        🔥 Chci vědět jak to dát
      </button>
    </div>

  </div>
</div>

<script>
function calculate() {
  let money = parseFloat(document.getElementById("money").value.replace(",", "."));
  let team = parseFloat(document.getElementById("team").value.replace(",", "."));

  if (isNaN(money) || isNaN(team)) {
    document.getElementById("result").innerHTML = "❌ Vyplň vše.";
    return;
  }

  let pv = money / 7;

  let levels = [
    { pv: 200, percent: 3 },
    { pv: 600, percent: 6 },
    { pv: 1200, percent: 9 },
    { pv: 2400, percent: 12 },
    { pv: 4000, percent: 15 },
    { pv: 7000, percent: 18 },
    { pv: 10000, percent: 21 }
  ];

  let chosen = levels[levels.length - 1];

  for (let level of levels) {
    if (pv <= level.pv) {
      chosen = level;
      break;
    }
  }

  let neededPeople = Math.ceil(chosen.pv / 100);
  let missing = Math.ceil(neededPeople - team);

  let resultBox = document.getElementById("result");

  resultBox.innerHTML =
    `🎯 Potřebuješ ${Math.ceil(pv)} PV<br>
     📊 Level ${chosen.percent}%<br><br>
     👥 Potřebuješ: ${neededPeople} lidí<br>
     👤 Máš: ${Math.ceil(team)}<br>`;

  // MESSAGE BOX
  let messageDiv = document.createElement("div");

  if (missing > 0) {
    messageDiv.className = "error";
    messageDiv.innerHTML = `⚠️ Chybí ti ${missing} lidí`;
  } else {
    messageDiv.className = "success";
    messageDiv.innerHTML = `✅ Máš dost lidí – teď stačí výkon`;
  }

  resultBox.appendChild(messageDiv);

  // GLOW efekt
  if (missing <= 0) {
    messageDiv.style.boxShadow = "0 0 20px #00ff99";
  }

  // REALITA
  let realityText = document.createElement("div");

  if (missing > 0) {
    realityText.style.color = "#ff4d4d";
    realityText.innerHTML = "👉 Takhle to teď nestačí – musíš změnit strategii";
  } else {
    realityText.style.color = "#00ff99";
    realityText.innerHTML = "👉 Jdeš správně – teď to jen škáluj";
  }

  realityText.style.marginTop = "10px";
  resultBox.appendChild(realityText);

  // EXTRA TLAK
  if (missing > 5) {
    // 🔥 KOLIK LIDÍ TÝDNĚ
if (missing > 0) {
  let weekly = Math.ceil(missing / 4);

  let weeklyDiv = document.createElement("div");
  weeklyDiv.style.marginTop = "10px";
  weeklyDiv.style.color = "#00c6ff";
  weeklyDiv.innerHTML = `📅 Musíš nabrat <b>${weekly}</b> lidí týdně`;

  resultBox.appendChild(weeklyDiv);
}
    let warning = document.createElement("div");
    warning.style.color = "#ffaa00";
    warning.style.marginTop = "10px";
    warning.innerHTML = "⚠️ Tohle je velký rozdíl – bez týmu to nepůjde";

    resultBox.appendChild(warning);
  }

  document.getElementById("cta").style.display = "block";
}

function openTelegram() {
  let username = "Simon37FX";
  let text = encodeURIComponent("Ahoj, chci poradit s plánem");
  window.location.href = `https://t.me/${username}?text=${text}`;
}
</script>

</body>
</html>
